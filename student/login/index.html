<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <meta name="title" content="" />
    <link rel="shortcut icon" href="/static/logos/icon.png" />
    <link rel="shortcut" href="/static/logos/icon.png" />
    <!-- Tailwind CSS CDN -->
    <script src="/static/js/tailwind.min.js"></script>
    <!-- jQuery CDN -->
    <script src="/static/js/jquery.min.js"></script>
    <script src="https://api.eduka.ng/static/sdk/educa-sdk.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="tailwind-ready font-sans">
    
    <!-- FULL SCREEN LOADER -->
    <div id="fullLoader" class="hidden fixed inset-0 bg-white/90 dark:bg-slate-950/90 backdrop-blur-lg z-[9999] flex items-center justify-center">
        <div class="text-center">
            <div class="w-16 h-16 border-4 border-[#1e3a8a] dark:border-blue-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
            <p class="mt-6 text-lg font-medium text-slate-600 dark:text-slate-400">Loading...</p>
        </div>
    </div>
    
    <div id="toastContainer" class="fixed top-6 right-6 space-y-3 z-[10000]"></div>
    
    <!-- LOGIN PAGE -->
    <div id="login-page" class="min-h-[calc(100vh-80px)] bg-slate-100 flex items-center justify-center p-5">
        <div class="login-container max-w-md w-full bg-white rounded-3xl shadow-2xl px-8 py-12 md:px-12">
            
            <!-- Logo -->
            <div class="flex justify-center mb-6">
                <img src="" class="site-logo w-16 h-16 rounded-3xl justify-center font-bold shadow-inner" />
            </div>
            
            <h1 class="text-center text-[#1e3a8a] text-3xl font-semibold">Staff Portal</h1>
            
            <!-- Form Card -->
            <div class="mt-10">
                <h2 class="font-semibold text-2xl mb-1">Staff Login</h2>
                <p class="text-slate-500 text-sm mb-8">Enter your credentials to access your account</p>
                
                <form id="loginForm">
                    <!-- Email -->
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-slate-600 mb-1.5">Email</label>
                        <input type="email" id="email" placeholder="example@domain.com" 
                               class="w-full border border-slate-200 focus:border-[#1e3a8a] rounded-2xl px-5 py-4 text-base outline-none">
                    </div>
                    
                    <!-- Password -->
                    <div class="mb-4 relative">
                        <label class="block text-sm font-medium text-slate-600 mb-1.5">Password</label>
                        <input type="password" id="password" 
                               class="w-full border border-slate-200 focus:border-[#1e3a8a] rounded-2xl px-5 py-4 text-base outline-none">
                        
                        <!-- Eye toggle -->
                        <button type="button" id="togglePassword" 
                                class="absolute right-5 top-[46px] text-slate-400 hover:text-slate-600">
                            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5 16.477 5 20.268 7.943 21.542 12 20.268 16.057 16.477 19 12 19 7.523 19 3.732 16.057 2.458 12z" />
                            </svg>
                        </button>
                    </div>
                    
                    <div class="flex justify-end mb-8 hidden">
                        <a href="#" onclick="forgotPassword()" class="text-[#1e3a8a] text-sm font-medium hover:underline">Forgot password?</a>
                    </div>
                    
                    <!-- Sign In Button -->
                    <button type="submit" 
                            class="w-full bg-[#1e3a8a] hover:bg-[#1e40af] text-white h-14 rounded-3xl text-lg font-semibold flex items-center justify-center gap-x-3 shadow-lg">
                        Sign In
                        <span class="text-2xl leading-none">→</span>
                    </button>
                </form>
                
                <a href="/" class="text-center mt-8 text-slate-400 hover:text-slate-600 text-sm cursor-pointer flex items-center justify-center gap-x-2">
                    ← Back to Cedarwood Homepage
                </a>
            </div>
        </div>
    </div>
    
    <script src="/static/js/functions.js"></script>
    <script src="/static/js/login.js"></script>
</body>
</html>
